name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install fastapi uvicorn pyserial pyinstaller pyorbital requests

      - name: Build executable
        run: |
          pyinstaller --onefile --name ic9700-ctrl --add-data "static;static" --hidden-import uvicorn --hidden-import uvicorn.loops.auto --hidden-import uvicorn.protocols.http.auto --hidden-import fastapi --hidden-import serial --hidden-import serial.tools.list_ports --collect-all uvicorn --console --noconfirm --clean app.py

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: ic9700-ctrl-windows
          path: dist/ic9700-ctrl.exe
          if-no-files-found: error
